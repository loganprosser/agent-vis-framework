providers:
  - id: mock
    type: mock
    default_model: mock-deterministic
    config:
      temperature: 0

  - id: openai_default
    type: openai
    default_model: gpt-4.1-mini
    config:
      api_key_env: OPENAI_API_KEY

  - id: anthropic_default
    type: anthropic
    default_model: claude-3-5-sonnet-latest
    config:
      api_key_env: ANTHROPIC_API_KEY
