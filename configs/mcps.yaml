servers:
  - id: builtin_demo
    name: Built-in Demo MCP
    transport: stdio
    enabled: true
    command:
      - "{python}"
      - "-m"
      - "app.tools.example_mcp_server"
    cwd: "{project_root}"
    env: {}
    timeout_seconds: 10

  - id: testforge_tnt
    name: TestForge TNT MCP
    transport: stdio
    enabled: true
    command:
      - "node"
      - "{env:TESTFORGE_MCP_ENTRY}"
    cwd: "{env:TESTFORGE_REPO_DIR}"
    env: {}
    timeout_seconds: 30
